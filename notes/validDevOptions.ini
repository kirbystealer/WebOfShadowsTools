// Remaining valid dev options in the game. 
// These can be specfied in .ini files or using the commandline.
// Options are bool,int,float or string (using prefixes -i, -f, -s)
// Command line options are specified like -fVOLUME_MASTER=50 or -sAVAILABLE_LANGUAGES=EN##ES##FR

[Audio]	
	VOLUME_VOICE=100 // voice volume
	VOLUME_SFX=100
	VOLUME_MUSIC=100
	VOLUME_MASTER=100 // master volume
[Camera]
	LOOKAROUND_CAMERA_INVERT_UD=0 
	LOOKAROUND_CAMERA_INVERT_LR=0	
[Conversation]
	menu_type=2	
[Quest]
	PICK_UP_AVAILABLE_QUESTS=0 // Picks up all available quests.
	COMPLETE_ACTIVE_QUESTS=0 // Completes all active quests.
[RPG]
	RPG_DEBUG_STAT_INDEX=1 // The index of the stat to view from debug.	
[RPGTuning]
	RELOAD_CURRENT_UPGRADE_SETTINGS=1	
[StorageOnline]
	RESTART_SKIP_THE_TITLE=1 // disable movies
	ENABLE_AUTO_SAVE=1
[SKU]
	AVAILABLE_LANGUAGES=EN IT

[MissionManager]
	STARTING_ACT=2
